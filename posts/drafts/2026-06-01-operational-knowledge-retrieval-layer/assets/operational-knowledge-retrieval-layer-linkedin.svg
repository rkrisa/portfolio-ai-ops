<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Operational Knowledge Retrieval Layer</title>
  <desc id="desc">A public-safe 16:9 graphic about starting a RAG layer in Postgres with evals and trace logs.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6efe4"/>
      <stop offset="45%" stop-color="#d9e5db"/>
      <stop offset="100%" stop-color="#9fbfae"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16322f"/>
      <stop offset="100%" stop-color="#224945"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#16322f" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="160" r="220" fill="#efe1c9" opacity="0.65"/>
  <circle cx="240" cy="760" r="260" fill="#c0d4c4" opacity="0.5"/>
  <rect x="108" y="100" width="1384" height="700" rx="36" fill="#fbf7f1" filter="url(#shadow)"/>
  <rect x="108" y="100" width="1384" height="700" rx="36" fill="url(#panel)"/>
  <text x="180" y="220" fill="#f6efe4" font-family="Georgia, 'Times New Roman', serif" font-size="34" letter-spacing="4">AI OPERATIONS PORTFOLIO</text>
  <text x="180" y="340" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700">Operational Knowledge</text>
  <text x="180" y="430" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700">Retrieval Layer</text>
  <text x="180" y="505" fill="#d9e5db" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="32">Why the first RAG layer starts in Postgres:</text>
  <g fill="#f6efe4" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="30">
    <text x="210" y="600">01  Retrieval close to operational data</text>
    <text x="210" y="660">02  Golden questions before infrastructure sprawl</text>
    <text x="210" y="720">03  Trace logs, guardrails and human review</text>
  </g>
  <g transform="translate(1030 250)">
    <rect x="0" y="0" width="320" height="96" rx="20" fill="#f6efe4"/>
    <text x="30" y="40" fill="#16322f" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="24" font-weight="700">approved_docs</text>
    <text x="30" y="72" fill="#48645f" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="22">rules, notes, handoff criteria</text>
    <rect x="0" y="136" width="320" height="96" rx="20" fill="#cde0d2"/>
    <text x="30" y="176" fill="#16322f" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="24" font-weight="700">pgvector</text>
    <text x="30" y="208" fill="#48645f" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="22">chunks + metadata + traces</text>
    <rect x="0" y="272" width="320" height="96" rx="20" fill="#efe1c9"/>
    <text x="30" y="312" fill="#16322f" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="24" font-weight="700">evals</text>
    <text x="30" y="344" fill="#48645f" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="22">golden questions + no-answer</text>
  </g>
</svg>
