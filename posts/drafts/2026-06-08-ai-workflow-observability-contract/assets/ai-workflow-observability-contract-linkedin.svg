<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI workflow observability cover</title>
  <desc id="desc">A public-safe 16 by 9 cover showing workflow, AI decision, review and trace panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1522"/>
      <stop offset="55%" stop-color="#0f1f33"/>
      <stop offset="100%" stop-color="#101521"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39c7ff"/>
      <stop offset="100%" stop-color="#2074d4"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffda79"/>
      <stop offset="100%" stop-color="#f6a62f"/>
    </linearGradient>
    <filter id="glowBlue">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { font: 500 21px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.08em; }
      .headline { font: 700 54px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.01em; }
      .sub { font: 400 24px 'Segoe UI', Arial, sans-serif; opacity: 0.85; }
      .small { font: 600 19px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.08em; }
    </style>
  </defs>

